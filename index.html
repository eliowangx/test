<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>新枫之谷站点导航</title>
    <style>
        @font-face {
            font-family: "Geist";
            src: url("https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Variable.woff2") format("woff2");
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg: oklch(0.985 0.004 82);
            --paper: oklch(1 0 0 / 0.84);
            --paper-strong: oklch(1 0 0);
            --fg: oklch(0.18 0.02 58);
            --muted: oklch(0.47 0.018 62);
            --subtle: oklch(0.63 0.012 74);
            --border: oklch(0.89 0.01 78);
            --online: oklch(0.52 0.18 42);
            --online-soft: oklch(0.52 0.18 42 / 0.1);
            --download: oklch(0.47 0.115 154);
            --download-soft: oklch(0.47 0.115 154 / 0.11);
            --shadow: 0 28px 80px oklch(0.2 0.02 60 / 0.12);
            --radius: 8px;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                    linear-gradient(180deg, oklch(0.52 0.18 42 / 0.08), transparent 330px),
                    repeating-linear-gradient(
                            135deg,
                            transparent 0 18px,
                            oklch(0.18 0.02 58 / 0.025) 18px 19px
                    ),
                    var(--bg);
            color: var(--fg);
            font-family: "Geist", "PingFang SC", "Microsoft YaHei", sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: inherit;
        }

        .page {
            width: min(1000px, 100%);
            min-height: 100vh;
            margin: 0 auto;
            padding:
                    clamp(42px, 10vh, 104px)
                    clamp(20px, 4vw, 44px)
                    clamp(34px, 6vw, 72px);
            display: grid;
            align-content: start;
            gap: clamp(22px, 3vw, 34px);
        }

        .hero {
            display: grid;
            justify-items: start;
            gap: 10px;
        }

        .logo {
            display: block;
            width: min(248px, 58vw);
            height: auto;
        }

        .hero p {
            max-width: 520px;
            margin: 0;
            color: var(--muted);
            font-size: clamp(0.975rem, 2vw, 1.075rem);
        }

        .links {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .entry {
            position: relative;
            min-height: 220px;
            overflow: hidden;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--paper);
            box-shadow: var(--shadow);
            text-decoration: none;
            backdrop-filter: blur(16px);
            transition:
                    border-color 180ms var(--ease),
                    background 180ms var(--ease),
                    transform 240ms var(--ease),
                    box-shadow 240ms var(--ease);
        }

        .entry::before {
            position: absolute;
            inset: 0;
            content: "";
            opacity: 0.9;
            transition: opacity 180ms var(--ease);
        }

        .entry.online::before {
            background:
                    linear-gradient(135deg, var(--online-soft), transparent 54%),
                    linear-gradient(90deg, var(--online) 0 6px, transparent 6px);
        }

        .entry.download::before {
            background:
                    linear-gradient(135deg, var(--download-soft), transparent 54%),
                    linear-gradient(90deg, var(--download) 0 6px, transparent 6px);
        }

        .entry-inner {
            position: relative;
            z-index: 1;
            height: 100%;
            min-width: 0;
            padding: clamp(20px, 2.8vw, 30px);
            display: grid;
            align-content: space-between;
            gap: 22px;
        }

        .entry-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: var(--subtle);
            font-size: 0.8125rem;
            font-weight: 760;
            text-transform: uppercase;
        }

        .entry-label::after {
            width: 36px;
            height: 36px;
            flex: 0 0 auto;
            border: 1px solid currentColor;
            border-radius: 50%;
            content: ">";
            display: grid;
            place-items: center;
            color: var(--fg);
            font-size: 1.125rem;
        }

        .entry h2 {
            margin: 0 0 6px;
            font-size: clamp(1.55rem, 3vw, 2.3rem);
            font-weight: 790;
            letter-spacing: 0;
            line-height: 1.08;
        }

        .entry p {
            margin: 0 0 14px;
            color: var(--muted);
            font-size: 0.975rem;
        }

        .url {
            display: block;
            min-width: 0;
            overflow-wrap: anywhere;
            color: var(--fg);
            font-size: clamp(0.875rem, 1.8vw, 1rem);
            font-weight: 680;
        }

        .entry:hover,
        .entry:focus-visible {
            border-color: oklch(0.76 0.025 76);
            background: var(--paper-strong);
            box-shadow: 0 34px 90px oklch(0.2 0.02 60 / 0.16);
            outline: none;
            transform: translateY(-4px);
        }

        .entry:hover::before,
        .entry:focus-visible::before {
            opacity: 1;
        }

        .entry:focus-visible {
            outline: 3px solid oklch(0.52 0.18 42 / 0.28);
            outline-offset: 3px;
        }

        @media (max-width: 720px) {
            .page {
                padding-top: clamp(32px, 8vh, 64px);
                gap: 20px;
            }

            .links {
                grid-template-columns: 1fr;
            }

            .entry {
                min-height: 194px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <section class="hero" aria-label="新枫之谷站点导航">
        <img class="logo" src="logo_ms.png" alt="新枫之谷">
        <p>从这里进入代码查询和下载中心</p>
    </section>

    <nav class="links" aria-label="站点链接">
        <a class="entry online" href="https://online.91mxd.vip/">
            <div class="entry-inner">
                <span class="entry-label">Online</span>
                <div>
                    <h2>代码查询</h2>
                    <p>查找新枫之谷相关代码</p>
                    <span class="url">https://online.91mxd.vip/</span>
                </div>
            </div>
        </a>

        <a class="entry download" href="https://dl.91mxd.vip/">
            <div class="entry-inner">
                <span class="entry-label">Download</span>
                <div>
                    <h2>下载中心</h2>
                    <p>下载客户端和更新补丁</p>
                    <span class="url">https://dl.91mxd.vip/</span>
                </div>
            </div>
        </a>
    </nav>
</main>
</body>
</html>
